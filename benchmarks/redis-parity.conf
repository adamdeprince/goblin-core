# Shared configuration pinned across Redis 7.2.4, Redis 8.8, and Valkey 9.1 for
# the memory/throughput benchmarks, so the only variable is the engine (and, for
# Goblin Core, the data structure). Differing configs are the most common way a
# benchmark gets contested; this file is published alongside the results.
#
# Applied identically to all three (they share the redis.conf format):
#   <engine>-server benchmarks/redis-parity.conf --port <p> --dir <tmp>
#
# Persistence off (RSS should reflect data, not save buffers / AOF):
save ""
appendonly no
# No eviction: never drop members mid-load.
maxmemory 0
maxmemory-policy noeviction
# No background defragmenter perturbing RSS during measurement.
activedefrag no
# Single-threaded I/O to match Goblin Core's single event loop.
io-threads 1
# Listpack/intset thresholds pinned to the shared defaults. Large sorted sets
# (>128 entries) use the skiplist encoding in every engine regardless, but
# pinning removes the argument.
zset-max-listpack-entries 128
zset-max-listpack-value 64
hash-max-listpack-entries 128
hash-max-listpack-value 64
set-max-listpack-entries 128
set-max-listpack-value 64
set-max-intset-entries 512
list-max-listpack-size 128
